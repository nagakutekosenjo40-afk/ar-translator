<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARリアルタイム翻訳 (精度向上版)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; text-align: center; overflow: hidden; }
        
        #header {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        select { padding: 5px; font-size: 14px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
        
        #video-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* 【改善3】中央のスキャンガイド枠 */
        #scan-guide {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 30%;
            max-width: 500px;
            max-height: 200px;
            border: 3px dashed #ffcc00; /* 黄色の点線枠 */
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4); /* 枠の外側を少し暗くする */
            border-radius: 8px;
            pointer-events: none;
            box-sizing: border-box;
            z-index: 50;
        }

        .translated-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #00ffcc;
            font-weight: bold;
            border: 2px solid #00ffcc;
            border-radius: 5px;
            padding: 5px;
            box-sizing: border-box;
            white-space: normal;
            word-wrap: break-word;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #00ffcc rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.3;
        }

        #controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
        button { padding: 12px 20px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #start-btn { background: #007bff; }
        #hold-btn { background: #28a745; display: none; }
        #hold-btn.holding { background: #dc3545; }

        #cover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
    </style>
</head>
<body>

    <div id="cover">
        <h1 style="margin-bottom: 30px;">AR翻訳アプリ</h1>
        <button id="start-btn">カメラを起動してスタート</button>
    </div>

    <div id="header">
        <span style="margin-right: 10px; font-size: 14px;">原文:</span>
        <select id="lang-select">
            <option value="eng">英語 (English)</option>
            <option value="fra">フランス語 (French)</option>
            <option value="deu">ドイツ語 (German)</option>
        </select>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="scan-guide"></div>
        <div id="overlay"></div>
    </div>

    <div id="controls">
        <button id="hold-btn">翻訳をキープ</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const holdBtn = document.getElementById('hold-btn');
        const langSelect = document.getElementById('lang-select');
        const scanGuide = document.getElementById('scan-guide');
        const cover = document.getElementById('cover');

        let isProcessing = false;
        let isHolding = false;
        let analysisInterval;

        startBtn.addEventListener('click', async () => {
            try {
                cover.style.display = 'none';
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
                
                video.addEventListener('playing', () => {
                    holdBtn.style.display = 'inline-block';
                    startAnalysis();
                });
            } catch (err) {
                alert("カメラ起動失敗: " + err.message);
                cover.style.display = 'flex';
            }
        });

        function startAnalysis() { analysisInterval = setInterval(captureAndTranslate, 2200); }
        function stopAnalysis() { clearInterval(analysisInterval); }

        holdBtn.addEventListener('click', () => {
            isHolding = !isHolding;
            if (isHolding) {
                stopAnalysis();
                holdBtn.innerText = "キープ中 (タップで解除)";
                holdBtn.classList.add('holding');
                overlay.style.pointerEvents = 'auto';
            } else {
                startAnalysis();
                holdBtn.innerText = "翻訳をキープ";
                holdBtn.classList.remove('holding');
                overlay.style.pointerEvents = 'none';
            }
        });

        async function captureAndTranslate() {
            if (isHolding || isProcessing || video.videoWidth === 0) return;
            isProcessing = true;

            const context = canvas.getContext('2d');
            
            // ビデオの元の解像度
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            
            // 画面上の見かけのサイズ
            const dWidth = video.clientWidth;
            const dHeight = video.clientHeight;

            // ガイド枠の画面上の位置とサイズを取得
            const guideRect = scanGuide.getBoundingClientRect();
            const containerRect = video.parentElement.getBoundingClientRect();

            // ガイド枠の相対的な位置を計算
            const relativeLeft = guideRect.left - containerRect.left;
            const relativeTop = guideRect.top - containerRect.top;

            // 画面のサイズからビデオの内部解像度への変換比率
            const scaleX = vWidth / dWidth;
            const scaleY = vHeight / dHeight;

            // 【改善3】ビデオ画像から「ガイド枠の中身」だけを切り出すための座標を計算
            const cropX = relativeLeft * scaleX;
            const cropY = relativeTop * scaleY;
            const cropW = guideRect.width * scaleX;
            const cropH = guideRect.height * scaleY;

            // キャンバスのサイズを切り出しサイズに合わせる
            canvas.width = cropW;
            canvas.height = cropH;

            // ガイド枠の部分だけをキャンバスに描画（クロップ処理）
            context.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            try {
                // クロップした画像だけをTesseractに渡す
                const result = await Tesseract.recognize(canvas, langSelect.value);
                
                overlay.innerHTML = '';

                // ガイド枠内での表示倍率
                const displayScaleX = guideRect.width / cropW;
                const displayScaleY = guideRect.height / cropH;

                const paragraphs = result.data.paragraphs;
                for (let p of paragraphs) {
                    const text = p.text.trim();
                    
                    // 【改善1】ゴミ取りフィルタ: 3文字未満、またはアルファベットが一切含まれないものは無視
                    if (text.length < 3 || !/[a-zA-Z]/.test(text)) {
                        continue; 
                    }

                    // 【改善2】信頼度フィルタ: Tesseractの自信が60%未満のテキストは誤認識とみなして無視
                    if (p.confidence < 60) {
                        continue;
                    }

                    // 翻訳を実行
                    const translatedText = await translateText(text);
                    const bbox = p.bbox;

                    // ガイド枠を基準とした絶対位置に変換
                    const left = relativeLeft + (bbox.x0 * displayScaleX);
                    const top = relativeTop + (bbox.y0 * displayScaleY);
                    const width = (bbox.x1 - bbox.x0) * displayScaleX;
                    const height = (bbox.y1 - bbox.y0) * displayScaleY;

                    const label = document.createElement('div');
                    label.className = 'translated-label';
                    label.innerText = translatedText;
                    
                    label.style.left = `${left}px`;
                    label.style.top = `${top}px`;
                    label.style.width = `${width}px`;
                    label.style.height = `${height}px`;

                    let fontSize = Math.max(11, Math.min(22, height * 0.35));
                    label.style.fontSize = fontSize + 'px';

                    overlay.appendChild(label);
                }
            } catch (error) {
                console.error("エラー:", error);
            } finally {
                isProcessing = false;
            }
        }

        async function translateText(text) {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url);
                const json = await response.json();
                return json[0].map(item => item[0]).join('');
            } catch (error) {
                return "...";
            }
        }
    </script>
</body>
</html>
